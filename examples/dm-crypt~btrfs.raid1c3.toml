# example: dm-crypt~btrfs.
#
# per-disk dm-crypt (no aead -- btrfs checksums its own data) with a btrfs
# raid1c3 profile across the crypt devices. adjust [disks].members to your system.

[install]
release = "forky"
backports = false
boot_mode = "efi"
extra_packages = ["vim", "git", "rsync", "screen"]
serial_console = false

[disks]
members = ["vda", "vdb", "vdc", "vdd"]
part_prefix = ""

[raid]
stack = "dm-crypt~btrfs"
level = "raid1c3"
# btrfs can use a cheaper metadata profile than data; empty defaults to level.
metadata_level = ""

[crypt]
# btrfs checksums its own data, so the crypt layer is plain (no aead). a plain
# cipher (aes-xts) is required when integrity = "none". sector_size 4096 suits
# 4k-native ssds; raiden aligns the root partition to it so plain luksFormat
# (which requires a sector-multiple device size) accepts it.
cipher = "aes-xts-plain64"
key_size = 512
sector_size = 4096
integrity = "none"
extra_args = []

[integrity]
algorithm = "xxhash64"

[btrfs]
csum = "xxhash"

[boot]
raid = false
level = 1
bitmap = "internal"
