# example: dm-crypt~md~lvm~ext4 (recommended), bios-boot variant.
#
# same as the raid6 example but legacy bios boot instead of efi: each disk gets a
# bios_boot partition and grub-pc, so any disk can boot the machine. adjust
# [disks].members to your system.

[install]
release = "forky"
backports = false
boot_mode = "bios"
extra_packages = ["vim", "git", "rsync", "screen"]
serial_console = false
initramfs_recovery = true

[disks]
members = ["vda", "vdb", "vdc", "vdd"]

[raid]
stack = "dm-crypt~md~lvm~ext4"
level = "6"
metadata_level = ""

[crypt]
# aegis128 is an aead cipher, so it requires crypt integrity = "aead".
cipher = "aegis128-plain64"
key_size = 128
sector_size = 4096
integrity = "aead"
extra_args = []

[integrity]
algorithm = "crc32c"

[btrfs]
csum = "xxhash"

[boot]
raid = false
level = 1
bitmap = "internal"
