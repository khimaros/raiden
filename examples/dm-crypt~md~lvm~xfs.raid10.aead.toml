# example: dm-crypt~md~lvm~xfs, raid10 variant.
#
# per-disk dm-crypt with aead integrity, an md raid10 array over the crypt
# devices, lvm on top, and an xfs root. raid10 needs an even member count of at
# least 4. adjust [disks].members to your system.

[install]
release = "forky"
backports = false
boot_mode = "efi"
extra_packages = ["vim", "git", "rsync", "screen"]
serial_console = false

[disks]
members = ["vda", "vdb", "vdc", "vdd"]
part_prefix = ""

[raid]
stack = "dm-crypt~md~lvm~xfs"
level = "10"
metadata_level = ""

[crypt]
# aegis128 is an aead cipher, so it requires crypt integrity = "aead".
cipher = "aegis128-plain64"
key_size = 128
sector_size = 4096
integrity = "aead"
extra_args = []

[integrity]
algorithm = "crc32c"

[btrfs]
csum = "xxhash"

[boot]
raid = false
level = 1
bitmap = "internal"
